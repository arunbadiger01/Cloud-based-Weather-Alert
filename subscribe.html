<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Subscribe | Sports Weather Alert</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">Sports Weather Alert</div>
    <div class="navbar-links">
      <a href="subscribe.html" class="active">Subscribe</a>
      <a href="unsubscribe.html">Unsubscribe</a>
    </div>
  </nav>
  <main class="main-content">
    <div class="container text-center">
      <h2>Subscribe to Alerts</h2>
      <p class="subtitle">Join our notification list to receive weather updates for your games.</p>
      <form id="subscribeForm">
        <input type="email" id="subEmail" placeholder="Email Address" required />
        <input type="text" id="subLocation" placeholder="Your Location" required />
        <input type="text" id="subSport" placeholder="Sport (e.g., Cricket)" required />
        <button type="submit">Subscribe</button>
        <div id="subscribeMsg" class="message"></div>
      </form>
    </div>
  </main>
  <script>
    document.getElementById("subscribeForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const email = document.getElementById("subEmail").value.trim();
      const location = document.getElementById("subLocation").value.trim();
      const sport = document.getElementById("subSport").value.trim();
      const msgDiv = document.getElementById("subscribeMsg");
      msgDiv.textContent = "Subscribing...";
      msgDiv.className = "message";
      try {
        const response = await fetch("https://etpzy58ogc.execute-api.eu-north-1.amazonaws.com/prod/subscribe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, location, sport })
        });
        const result = await response.json();
        msgDiv.textContent = result.message || "Subscribed!";
        msgDiv.classList.add(response.ok ? "success" : "error");
      } catch (err) {
        msgDiv.textContent = "Failed to connect.";
        msgDiv.classList.add("error");
      }
    });
  </script>
</body>
</html>
